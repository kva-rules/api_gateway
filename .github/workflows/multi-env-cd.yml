name: Multi-Env CI/CD Pipeline

on:
  push:
    branches: [main, develop, int, uat, prod]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io/${{ github.repository_owner }}
  IMAGE_NAME: api-gateway

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      sha_short: ${{ steps.set_sha.outputs.sha_short }}
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "maven"

      - name: Build & test
        run: ./mvnw clean verify

      - name: Set SHA
        id: set_sha
        run: echo "sha_short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.set_sha.outputs.sha_short }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=image,digest

  deploy-int:
    needs: build
    if: github.ref == 'refs/heads/int' || github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - name: Tag & Deploy INT
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.sha_short }}
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.sha_short }} ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:int
          echo "INT deployment complete: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:int"

  deploy-uat:
    needs: build
    if: github.ref == 'refs/heads/uat'
    runs-on: ubuntu-latest
    steps:
      - name: Tag & Deploy UAT
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.sha_short }}
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.sha_short }} ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:uat
          echo "UAT deployment complete: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:uat"

  deploy-prod:
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/prod'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Manual approval
        uses: trstringer/manual-approval@v1
        with:
          secret: DEPLOY_PROD_SECRET
          approvers: your-github-username
          minimum-approvals: 1
          issue-title: "Production deployment approval"
          issue-body: "Approve PROD deployment of ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.sha_short }}"

      - name: Tag & Deploy PROD
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.sha_short }}
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.sha_short }} ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:prod
          echo "PROD deployment complete: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:prod"
