name: API Gateway CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY_IMAGE: ghcr.io/${{ github.repository_owner }}/api-gateway:latest

jobs:
  build-test-docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Build project
        run: ./mvnw clean compile

      - name: Run tests
        run: ./mvnw test

      - name: Build executable jar
        run: ./mvnw clean package -DskipTests

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.REGISTRY_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test running container
        if: always()
        run: |
          docker run --rm -d --name test-container -p 8080:8080 ${{ env.REGISTRY_IMAGE }}
          sleep 10
          curl -f http://localhost:8080/gateway/health
          docker stop test-container

  security-scan:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Run OWASP Dependency Check
        uses: github/dependency-graph@v1
        with:
          schema-file: bom.json
