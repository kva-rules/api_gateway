spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/users/**
        - id: order-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/orders/**
      globalcors:
        cors-configurations:
          "[/**]":
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/auth
          jwk-set-uri: http://localhost:8080/.well-known/jwks.json
server:
  port: 8080

jwt:
  secret: mySecretKeyForSigningJWTs
  expiration: 86400000
