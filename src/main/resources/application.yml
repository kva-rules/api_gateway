server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://auth-service:8081
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=0

        - id: user-service
          uri: http://user-service:8082
          predicates:
            - Path=/api/users/**
          filters:
            - StripPrefix=0
            - AuthFilter

        - id: ticket-service
          uri: http://ticket-service:8083
          predicates:
            - Path=/api/tickets/**
          filters:
            - StripPrefix=0
            - AuthFilter

        - id: solution-service
          uri: http://solution-service:8084
          predicates:
            - Path=/api/solutions/**
          filters:
            - StripPrefix=0
            - AuthFilter

        - id: knowledge-service
          uri: http://knowledge-service:8085
          predicates:
            - Path=/api/knowledge/**
          filters:
            - StripPrefix=0
            - AuthFilter

        - id: ratings-service
          uri: http://knowledge-service:8085
          predicates:
            - Path=/api/ratings/**
          filters:
            - StripPrefix=0
            - AuthFilter

        - id: reward-service
          uri: http://reward-service:8086
          predicates:
            - Path=/api/rewards/**
          filters:
            - StripPrefix=0
            - AuthFilter

        - id: notification-service
          uri: http://notification-service:8087
          predicates:
            - Path=/api/notifications/**
          filters:
            - StripPrefix=0
            - AuthFilter

        - id: notification-websocket
          uri: ws://notification-service:8087
          predicates:
            - Path=/ws/notifications/**
          filters:
            - StripPrefix=0

        - id: frontend
          uri: http://frontend:3000
          predicates:
            - Path=/**

      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway
  endpoint:
    health:
      show-details: always

jwt:
  secret: myVerySecretKeyForJWTThatIsLongEnoughForHS512Signature
  expiration: 86400000

auth-service:
  url: http://auth-service:8081

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
