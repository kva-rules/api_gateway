jwt:
  secret: test-secret-key-for-jwt-validation
  expiration: 86400000

services:
  user-service:
    url: http://localhost:8081
  ticket-service:
    url: http://localhost:8082
  reward-service:
    url: http://localhost:8083
  notification-service:
    url: http://localhost:8084

logging:
  level:
    com.example.api_gateway: DEBUG
    root: INFO

spring:
  cloud:
    gateway:
      routes:
        - id: mock-user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/internal/stats
        - id: mock-ticket-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/internal/stats
        - id: mock-reward-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/internal/stats
        - id: mock-notification-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/internal/stats

management:
  endpoints:
    web:
      exposure:
        include: health,metrics
  endpoint:
    health:
      show-details: always
